  - {type: variant, offset: 5620, length: 295, content: '制其身口者不能持經戒，如此曹人亦不樂其身。」那先言：「其學道人者，能制其身、能制口、能持經戒，能一其心得四禪，便能不復喘息耳。」王言：「善哉善哉！」王復問那先：「為呼言CBETA 按：大正本（T32n1670Ap0702c10）有校勘作「[10]海～Samudda.」。海，海為是水名為海耶？用他事故言海？」那先言：「人所以呼為海者，水與鹽參各半，是故為海耳。」王復問那先：「何以故海悉醎如鹽味？」那先言：「所以海水醎者，啖畜以來久遠，及魚鼈虫多共漬水中，是故令醎耳。」王言：「善哉善哉！」王復問那先：「人得道已，寧能悉思惟深奧眾事不？」那先言：「然。人得道已，能悉思惟深奧之事。佛經最深奧知眾事，不可稱量眾事皆以智評之。」王言：「善哉善哉！」王復問那先：「CBETA 按：大正本（T32n1670Ap0702c20）有校勘作「[11]人神～Jīva.」。人神、CBETA 按：大正本（T32n1670Ap0702c20）有校勘作「[12]智～Paññā.」。智、CBETA 按：大正本（T32n1670Ap0702c20）有校勘作「[13]自然～Dhamma.」。自然，此三事寧同不各異？」那先言：「人神者生覺，智者曉道，自然者虛空無有人也。」王又問那先：「人言得人，何等為得人者？今眼視色、耳聽聲、鼻聞香臭、口知味、身知軟麁、志知善惡之事，何所為得人者K30n1002_p0257a01-a23T32n1670Bp0718b14-c02', 大: ''}
