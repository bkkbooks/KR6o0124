  - {type: line-break, offset: 5303, content: '', id: KR6o0124_T_002-0702c20, ed: T, 'n': 0702c20}
  - {type: line-break, offset: 5303, content: '', id: KR6o0124_T_002-0702c21, ed: T, 'n': 0702c21}
  - {type: line-break, offset: 5303, content: '', id: KR6o0124_T_002-0702c22, ed: T, 'n': 0702c22}
  - {type: line-break, offset: 5303, content: '', id: KR6o0124_T_002-0702c23, ed: T, 'n': 0702c23}
  - {type: line-break, offset: 5303, content: '', id: KR6o0124_T_002-0702c24, ed: T, 'n': 0702c24}
  - {type: line-break, offset: 5303, content: '', id: KR6o0124_T_002-0702c25, ed: T, 'n': 0702c25}
  - {type: variant, offset: 5303, length: 0, content: K30n1002_p0256b23-c01T32n1670Bp0718a25, 大: 不制其身口者不能持經}
  - {type: variant, offset: 5303, length: 0, content: K30n1002_p0256b23-c01T32n1670Bp0718a25, 大: 戒。如此曹人亦不樂其身。那先言。其學道人}
  - {type: variant, offset: 5303, length: 0, content: K30n1002_p0256b23-c01T32n1670Bp0718a25, 大: 者。能制其身能制口能持經戒。能一其心得}
  - {type: variant, offset: 5303, length: 0, content: K30n1002_p0256b23-c01T32n1670Bp0718a25, 大: 四禪。便能不復喘息耳。王言善哉善哉。}
  - {type: variant, offset: 5303, length: 0, content: K30n1002_p0256b23-c01T32n1670Bp0718a25, 大: 王復問那先。為呼言海～Samudda.海【大】，～Samudda.海。海為是水名為海}
  - {type: variant, offset: 5303, length: 0, content: K30n1002_p0256b23-c01T32n1670Bp0718a25, 大: 耶。用他事故言海。那先言。人所以呼為海者。}
  - {type: variant, offset: 5303, length: 0, content: K30n1002_p0256b23-c01T32n1670Bp0718a25, 大: 水與鹽參各半。是故為海耳。王復問那先。何}
  - {type: variant, offset: 5303, length: 0, content: K30n1002_p0256b23-c01T32n1670Bp0718a25, 大: 以故海悉醎如鹽味。那先言。所以海水醎者。}
  - {type: variant, offset: 5303, length: 0, content: K30n1002_p0256b23-c01T32n1670Bp0718a25, 大: 啖畜以來久遠。及魚鼈虫多共漬水中。是故}
  - {type: variant, offset: 5303, length: 0, content: K30n1002_p0256b23-c01T32n1670Bp0718a25, 大: 爾醎耳。王言善哉善哉。}
  - {type: variant, offset: 5303, length: 0, content: K30n1002_p0256b23-c01T32n1670Bp0718a25, 大: 王復問那先。人得道已寧能悉思惟深奧眾}
  - {type: variant, offset: 5303, length: 0, content: K30n1002_p0256b23-c01T32n1670Bp0718a25, 大: 事不。那先言然。人得道已。能悉思惟深奧之}
  - {type: variant, offset: 5303, length: 0, content: K30n1002_p0256b23-c01T32n1670Bp0718a25, 大: 事。佛經最深奧知眾事。不可稱量眾事。皆以}
  - {type: variant, offset: 5303, length: 0, content: K30n1002_p0256b23-c01T32n1670Bp0718a25, 大: 智評之。王言善哉善哉。}
  - {type: variant, offset: 5303, length: 0, content: K30n1002_p0256b23-c01T32n1670Bp0718a25, 大: "王復問那先。人神～Jīva.人神【大】，～Jīva.\t人神\n\tJīva.\n智～Paññā.智【大】，～Paññā.\t智\n\tPaññā.\n自然～Dhamma.自然【大】，～Dhamma.\t自然\n\tDhamma.\n此三事寧同不"}
  - {type: variant, offset: 5303, length: 0, content: K30n1002_p0256b23-c01T32n1670Bp0718a25, 大: 各異。那先言。人神者。生覺智者。曉道自然}
  - {type: variant, offset: 5303, length: 0, content: K30n1002_p0256b23-c01T32n1670Bp0718a25, 大: 者。虛空無有人也。王又問那先。人言得人何}
  - {type: variant, offset: 5303, length: 0, content: K30n1002_p0256b23-c01T32n1670Bp0718a25, 大: 等為得人者。今眼視色耳聽聲鼻聞香臭口}
  - {type: variant, offset: 5303, length: 0, content: K30n1002_p0256b23-c01T32n1670Bp0718a25, 大: 知味身知軟麁。志知善惡之事。何所為得人}
  - {type: variant, offset: 5303, length: 0, content: K30n1002_p0256b23-c01T32n1670Bp0718a25, 大: 者}
